name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Run remote Laravel commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 123.6.146.63
          username: root
          port: 22
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /www/wwwroot/2026hpeapi.hzblzh.com
            if [ ! -d .git ]; then
              find . -mindepth 1 -maxdepth 1 ! -name ".env" ! -name ".user.ini" ! -name "storage" ! -name "database" -exec rm -rf {} \;
              git clone https://github.com/lzy497066369/2026hpe_hou.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
            if [ ! -f .env ]; then cp .env.example .env; fi
            if [ ! -f database/database.sqlite ]; then touch database/database.sqlite; fi
            if ! grep -q '^APP_KEY=base64:' .env; then php artisan key:generate --force; fi
            php artisan migrate --force
            php artisan storage:link || true
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            chown -R www:www storage bootstrap/cache database/database.sqlite
